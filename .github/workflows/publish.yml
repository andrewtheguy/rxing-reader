name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from workspace Cargo.toml
        id: version
        run: |
          version=$(awk -F'"' '
            /^\[workspace\.package\]/ { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && /^version[[:space:]]*=/ { print $2; exit }
          ' Cargo.toml)
          if [ -z "$version" ]; then
            echo "Failed to parse version from workspace Cargo.toml" >&2
            exit 1
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Block if release already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists" >&2
            exit 1
          fi

  build-wasm:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rxing-wasm/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
        working-directory: rxing-wasm

      - run: npm run build
        working-directory: rxing-wasm

      - run: npm pack
        working-directory: rxing-wasm/pkg

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: rxing-wasm/pkg/*.tgz
          if-no-files-found: error

  build-cli:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - run: cargo build -p rxing-cli --release

      - name: Package binary
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          archive="rxing-cli-${TAG}-${TARGET}.tar.gz"
          tar -C target/release -czvf "$archive" rxing-cli
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  publish:
    needs: [prepare, build-wasm, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release and upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --draft \
            --generate-notes
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            dist/*

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
