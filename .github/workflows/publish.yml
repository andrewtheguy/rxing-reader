name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@andrewtheguy'
          cache: npm
          cache-dependency-path: rxing-wasm/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: rxing-wasm
      - run: npm run build
        working-directory: rxing-wasm
      - run: npm publish --registry https://npm.pkg.github.com
        working-directory: rxing-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
